name: Deploy Backend to Cloud Run (Production)

on:
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if no changes'
        required: false
        default: false
        type: boolean

env:
  REGION: asia-northeast1
  SERVICE_NAME: universegeo-backend

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run (Production)
    runs-on: ubuntu-latest
    
    # 本番環境用のEnvironment secretsを使用
    environment:
      name: Environment secrets
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          echo "🔍 必須Secretsの確認中（本番環境）..."
          echo "  Environment: Environment secrets"
          echo ""
          
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ GCP_SA_KEY is missing"
            echo "   Settings > Environments > Environment secrets > Secrets に GCP_SA_KEY を設定してください"
            exit 1
          fi
          
          if [ -z "${{ secrets.BQ_DATASET }}" ]; then
            echo "❌ BQ_DATASET is missing"
            exit 1
          fi
          
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ] && [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "❌ GCP_PROJECT_ID is missing"
            exit 1
          fi
          
          echo "✅ 必須Secretsが設定されています（本番環境）"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          source: ./backend
          region: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          
          env_vars_update_strategy: merge
          env_vars: |-
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
            BQ_DATASET=${{ secrets.BQ_DATASET }}
            GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}
            GOOGLE_SHEETS_API_KEY=${{ secrets.GOOGLE_SHEETS_API_KEY }}
            GOOGLE_SHEET_NAME=${{ secrets.GOOGLE_SHEET_NAME || 'シート1' }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EMAIL_SERVICE=${{ secrets.EMAIL_SERVICE }}
            SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
            SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}
            NODE_ENV=production
            DEBUG=false
            LOG_LEVEL=info
            VERTEX_AI_LOCATION=${{ secrets.VERTEX_AI_LOCATION || 'us-central1' }}
            VERTEX_AI_MODEL=${{ secrets.VERTEX_AI_MODEL || 'gemini-2.0-flash-001' }}

          flags: >-
            --allow-unauthenticated
            --memory 512Mi
            --cpu 1
            --max-instances 10
          
          revision_traffic: 'LATEST=100'

      - name: Set SCHEDULER_SECRET
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }} \
            --update-env-vars=SCHEDULER_SECRET=${{ secrets.SCHEDULER_SECRET }}

      - name: Deployment Summary
        run: |
          echo "## ✅ Backend Deployment Successful (Production)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. 本番環境のバックエンドログを確認" >> $GITHUB_STEP_SUMMARY
          echo "2. 本番環境のテストを実行" >> $GITHUB_STEP_SUMMARY
          echo "3. モニタリングを確認" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "🚀 Backend deployed to: ${{ steps.deploy.outputs.url }}"
