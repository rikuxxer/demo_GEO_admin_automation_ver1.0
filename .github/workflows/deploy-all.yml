name: Deploy All (Backend + Frontend)

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'Dockerfile'
      - 'config/prod/**'
      - 'backend/**'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend'
        required: false
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy frontend'
        required: false
        default: true
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1

jobs:
  deploy-backend:
    name: Deploy Backend
    if: github.event.inputs.deploy_backend != 'false'
    runs-on: ubuntu-latest
    
    environment:
      name: Environment secrets
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Secrets
        run: |
          echo "🔍 デバッグ情報:"
          echo "GitHub Event: ${{ github.event_name }}"
          echo "GitHub Repository: ${{ github.repository }}"
          echo "Environment: ${{ job.environment }}"
          echo "Environment Name: Environment secrets"
          echo ""
          echo "📋 ワークフロー設定確認:"
          echo "  environment.name: Environment secrets ✅"
          echo ""
          echo "📋 Secrets確認（値は表示しません）:"
          echo ""
          echo "必須Secrets:"
          GCP_SA_KEY_EXISTS="$([ -n "${{ secrets.GCP_SA_KEY }}" ] && echo 'YES' || echo 'NO')"
          echo "  GCP_SA_KEY exists: $GCP_SA_KEY_EXISTS"
          if [ "$GCP_SA_KEY_EXISTS" = "YES" ]; then
            echo "  GCP_SA_KEY length: $(echo -n "${{ secrets.GCP_SA_KEY }}" | wc -c) 文字"
            echo "  ✅ Environment secrets から GCP_SA_KEY が取得できています"
          else
            echo "  GCP_SA_KEY length: 0 文字"
            echo "  ❌ Environment secrets から GCP_SA_KEY が取得できていません"
          fi
          
          GCP_PROJECT_ID_EXISTS="$([ -n "${{ secrets.GCP_PROJECT_ID }}" ] && echo 'YES' || echo 'NO')"
          echo "  GCP_PROJECT_ID exists: $GCP_PROJECT_ID_EXISTS"
          if [ "$GCP_PROJECT_ID_EXISTS" = "YES" ]; then
            echo "  GCP_PROJECT_ID value: ${{ secrets.GCP_PROJECT_ID }}"
            echo "  ✅ Environment secrets から GCP_PROJECT_ID が取得できています"
          else
            echo "  ❌ Environment secrets から GCP_PROJECT_ID が取得できていません"
          fi
          echo ""
          echo "その他のSecrets:"
          BACKEND_SA_EXISTS="$([ -n "${{ secrets.BACKEND_SERVICE_ACCOUNT }}" ] && echo 'YES' || echo 'NO')"
          echo "  BACKEND_SERVICE_ACCOUNT exists: $BACKEND_SA_EXISTS"
          BQ_DATASET_EXISTS="$([ -n "${{ secrets.BQ_DATASET }}" ] && echo 'YES' || echo 'NO')"
          echo "  BQ_DATASET exists: $BQ_DATASET_EXISTS"
          echo ""
          echo "📝 重要:"
          echo "このワークフローは 'environment: name: Environment secrets' を設定しているため、"
          echo "Environment secrets (Environment secrets) を参照します。"
          echo ""
          if [ "$GCP_SA_KEY_EXISTS" = "NO" ]; then
            echo "⚠️ 問題: GCP_SA_KEY が取得できていません"
            echo ""
            echo "確認事項:"
            echo "1. https://github.com/${{ github.repository }}/settings/environments/Environment%20secrets を開く"
            echo "2. Environment secrets セクションで 'GCP_SA_KEY' が存在するか確認"
            echo "3. Secret名が正確に 'GCP_SA_KEY' であるか確認（大文字・小文字）"
            echo "4. Environment名が 'Environment secrets' であるか確認"
          fi

      - name: Verify Secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "🔍 Secret確認中..."
          echo ""
          
          # GCP_SA_KEY の確認
          # 環境変数から安全に取得
          if [ -z "$GCP_SA_KEY" ]; then
            GCP_SA_KEY_LENGTH=0
          else
            # 一時ファイルに書き込んで長さを確認（安全な方法）
            echo "$GCP_SA_KEY" > /tmp/gcp_sa_key_check.json
            GCP_SA_KEY_LENGTH=$(wc -c < /tmp/gcp_sa_key_check.json | tr -d ' ')
            rm -f /tmp/gcp_sa_key_check.json
          fi
          
          if [ -z "$GCP_SA_KEY" ] || [ "$GCP_SA_KEY_LENGTH" -eq 0 ]; then
            echo "❌ エラー: GCP_SA_KEY が設定されていません"
            echo ""
            echo "📝 設定方法（Environment secrets）:"
            echo ""
            echo "このワークフローは 'environment: Environment secrets' を設定しているため、"
            echo "Environment secrets を参照します。"
            echo ""
            echo "設定手順:"
            echo "1. https://github.com/${{ github.repository }}/settings/environments/Environment%20secrets を開く"
            echo "2. Environment secrets セクションで Add secret をクリック"
            echo "3. Name: GCP_SA_KEY（大文字・小文字を正確に）"
            echo "   ⚠️ 重要: Secret名は 'GCP_SA_KEY' と完全に一致する必要があります"
            echo "   ❌ 間違い: gcp_sa_key, GCP-SA-KEY, GCP_SA_KEY_ など"
            echo "4. Secret: サービスアカウントキー（JSON）の内容全体を貼り付け"
            echo "   - JSON全体（{ から } まで）をそのまま貼り付け"
            echo "   - 改行も含めてそのまま貼り付け"
            echo "5. Add secret をクリック"
            echo ""
            echo "⚠️ 確認事項:"
            echo "- Environment secrets に 'GCP_SA_KEY' が存在するか確認"
            echo "- Secret名が正確に 'GCP_SA_KEY' であるか確認（大文字・小文字）"
            echo "- JSONファイルの内容全体をコピー&ペーストしているか確認"
            exit 1
          fi
          
          echo "✅ GCP_SA_KEY が設定されています（長さ: $GCP_SA_KEY_LENGTH 文字）"
          
          # GCP_PROJECT_ID の確認
          if [ -z "$GCP_PROJECT_ID" ]; then
            echo "❌ エラー: GCP_PROJECT_ID が設定されていません"
            exit 1
          fi
          echo "✅ GCP_PROJECT_ID: $GCP_PROJECT_ID"
          
          # その他のSecretsの確認
          echo ""
          echo "📋 その他のSecrets確認:"
          echo "BQ_DATASET: $([ -z "${{ secrets.BQ_DATASET }}" ] && echo "❌ 未設定" || echo "✅ 設定済み")"
          echo "BACKEND_SERVICE_ACCOUNT: $([ -z "${{ secrets.BACKEND_SERVICE_ACCOUNT }}" ] && echo "❌ 未設定" || echo "✅ 設定済み")"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend
        working-directory: ./backend
        run: |
          echo "🚀 Deploying backend to Cloud Run..."
          echo ""
          echo "📋 デプロイ設定:"
          echo "  Service: universegeo-backend"
          echo "  Region: ${{ env.REGION }}"
          echo "  Project: ${{ env.PROJECT_ID }}"
          echo "  Service Account: (デフォルト - 権限エラーを回避するため)"
          echo ""
          echo "💡 注意: サービスアカウントの権限エラーを回避するため、"
          echo "   デフォルトのサービスアカウントを使用します。"
          echo "   必要に応じて、後でCloud Runサービスの設定から変更できます。"
          echo ""
          
          # リージョンの値を明示的に設定（デバッグ用）
          REGION_VALUE="${{ env.REGION }}"
          echo "🔍 デバッグ: REGION_VALUE = '$REGION_VALUE'"
          if [ -z "$REGION_VALUE" ] || [ "$REGION_VALUE" != "asia-northeast1" ]; then
            echo "⚠️ 警告: リージョン値が予期しない値です。'asia-northeast1' に設定します。"
            REGION_VALUE="asia-northeast1"
          fi
          echo "✅ 使用するリージョン: $REGION_VALUE"
          echo ""
          
          # 環境変数を構築（デプロイ時に一緒に設定してバージョン競合を回避）
          ENV_VARS="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},BQ_DATASET=${{ secrets.BQ_DATASET }}"
          
          if [ -n "${{ secrets.GOOGLE_SPREADSHEET_ID }}" ]; then
            ENV_VARS="$ENV_VARS,GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}"
          fi
          
          if [ -n "${{ secrets.GOOGLE_SHEETS_API_KEY }}" ]; then
            ENV_VARS="$ENV_VARS,GOOGLE_SHEETS_API_KEY=${{ secrets.GOOGLE_SHEETS_API_KEY }}"
          fi
          
          if [ -n "${{ secrets.GOOGLE_SHEET_NAME }}" ]; then
            ENV_VARS="$ENV_VARS,GOOGLE_SHEET_NAME=${{ secrets.GOOGLE_SHEET_NAME }}"
          else
            ENV_VARS="$ENV_VARS,GOOGLE_SHEET_NAME=シート1"
          fi
          
          if [ -n "${{ secrets.FRONTEND_URL }}" ]; then
            ENV_VARS="$ENV_VARS,FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
          else
            ENV_VARS="$ENV_VARS,FRONTEND_URL=http://localhost:5173"
          fi

          if [ -n "${{ secrets.SCHEDULER_SECRET }}" ]; then
            ENV_VARS="$ENV_VARS,SCHEDULER_SECRET=${{ secrets.SCHEDULER_SECRET }}"
          fi
          
          echo ""
          echo "🔧 環境変数をデプロイ時に設定します（バージョン競合を回避）..."
          echo "設定する環境変数: $(echo $ENV_VARS | sed 's/[^,=]*=[^,]*/***/g')"
          
          # デプロイ時に環境変数を一緒に設定（--update-env-varsを使用して既存の環境変数とマージ）
          set +e
          gcloud run deploy universegeo-backend \
            --source . \
            --region "$REGION_VALUE" \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --update-env-vars "$ENV_VARS" \
            --project ${{ env.PROJECT_ID }}
          DEPLOY_EXIT_CODE=$?
          set -e
          
          if [ $DEPLOY_EXIT_CODE -eq 0 ]; then
            echo "✅ デプロイと環境変数の設定が完了しました"
          fi
          
          if [ $DEPLOY_EXIT_CODE -ne 0 ]; then
            echo ""
            echo "❌ デプロイが失敗しました"
            echo ""
            echo "📋 ビルドログを取得中..."
            echo ""
            
            # プロジェクトIDを変数に保存（マスクされないように）
            PROJECT_ID="${{ env.PROJECT_ID }}"
            echo "プロジェクトID: $PROJECT_ID"
            echo ""
            
            # 少し待ってからビルドログを取得（ビルドが完了するまで待つ）
            echo "ビルド完了を待機中（25秒）..."
            sleep 25
            
            # 最新のビルドIDを取得（複数の方法を試す）
            echo "ビルドIDを取得中..."
            LATEST_BUILD=$(gcloud builds list --limit=1 --sort-by=~createTime --format='value(id)' --project "$PROJECT_ID" 2>&1 | head -1)
            
            # 警告メッセージを除外
            if echo "$LATEST_BUILD" | grep -q "WARNING"; then
              LATEST_BUILD=$(echo "$LATEST_BUILD" | grep -v "WARNING" | head -1)
            fi
            
            if [ -z "$LATEST_BUILD" ] || [ "$LATEST_BUILD" = "" ] || [ "${LATEST_BUILD:0:1}" = "W" ]; then
              echo "別の方法でビルドIDを取得中..."
              LATEST_BUILD=$(gcloud builds list --limit=1 --format='value(id)' --project "$PROJECT_ID" 2>&1 | grep -v "WARNING" | head -1)
            fi
            
            if [ -n "$LATEST_BUILD" ] && [ "$LATEST_BUILD" != "" ] && [ "${LATEST_BUILD:0:1}" != "W" ] && [ "${#LATEST_BUILD}" -gt 10 ]; then
              echo "✅ 最新のビルドID: $LATEST_BUILD"
              echo ""
              echo "📋 ビルドログ（最後の500行）:"
              echo "=========================================="
              gcloud builds log "$LATEST_BUILD" --project "$PROJECT_ID" 2>&1 | tail -500
              echo "=========================================="
              echo ""
              echo "📋 エラー部分のみ抽出:"
              echo "----------------------------------------"
              gcloud builds log "$LATEST_BUILD" --project "$PROJECT_ID" 2>&1 | grep -i "error\|failed\|fail\|ERROR\|FAILED" | tail -50
              echo "----------------------------------------"
              echo ""
              echo "📋 ビルドの詳細情報:"
              gcloud builds describe "$LATEST_BUILD" --project "$PROJECT_ID" --format='yaml(status,logUrl,steps)' 2>&1 | head -100
            else
              echo "⚠️ ビルドIDを取得できませんでした"
              echo "取得結果: $LATEST_BUILD"
              echo ""
              echo "最近のビルド一覧（デバッグ情報）:"
              echo "----------------------------------------"
              gcloud builds list --limit=5 --project "$PROJECT_ID" 2>&1
              echo "----------------------------------------"
              echo ""
              echo "💡 代替方法: サービス名からビルドを検索..."
              SERVICE_NAME="universegeo-backend"
              echo "サービス名: $SERVICE_NAME"
              gcloud builds list --filter="substitutions.SERVICE_NAME=$SERVICE_NAME" --limit=1 --project "$PROJECT_ID" 2>&1
            fi
            
            echo ""
            echo "📋 ビルドログを確認する方法:"
            echo ""
            echo "方法1: Google Cloud Console（推奨）"
            echo "   1. https://console.cloud.google.com/cloud-build/builds を開く"
            echo "   2. プロジェクトセレクタでプロジェクトを選択"
            echo "      （プロジェクトID: $PROJECT_ID）"
            echo "   3. 最新のビルドをクリック"
            echo "   4. ビルドログを確認"
            echo ""
            echo "   直接リンク（プロジェクトIDを手動で置き換えてください）:"
            echo "   https://console.cloud.google.com/cloud-build/builds?project=$PROJECT_ID"
            echo ""
            echo "方法2: gcloud CLI（ローカルで実行）"
            echo "   # 最新のビルドIDを取得"
            echo "   gcloud builds list --limit=1 --project $PROJECT_ID"
            echo ""
            echo "   # ビルドログを表示（BUILD_IDを実際のIDに置き換え）"
            echo "   gcloud builds log [BUILD_ID] --project $PROJECT_ID"
            echo ""
            echo "💡 ヒント: ビルドが失敗している場合、以下の点を確認してください:"
            echo "   - Dockerfileが正しく配置されているか"
            echo "   - package.jsonとtsconfig.jsonが存在するか"
            echo "   - 必要なファイルがすべてコピーされているか"
            echo "   - TypeScriptのコンパイルエラーがないか"
            echo "   - npm installが正常に完了しているか"
            echo ""
            exit $DEPLOY_EXIT_CODE
          fi

      - name: Get Backend URL
        id: backend-url
        if: success() || failure()  # デプロイが成功または失敗した場合でも実行
        run: |
          echo "🔍 バックエンドURLを取得中..."
          
          # リージョンの値を明示的に設定
          REGION_VALUE="${{ env.REGION }}"
          if [ -z "$REGION_VALUE" ] || [ "$REGION_VALUE" != "asia-northeast1" ]; then
            REGION_VALUE="asia-northeast1"
          fi
          
          # 少し待ってからURLを取得（サービスが完全にデプロイされるまで待つ）
          echo "サービスが完全にデプロイされるまで待機中（15秒）..."
          sleep 15
          
          BACKEND_URL=$(gcloud run services describe universegeo-backend \
            --region "$REGION_VALUE" \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }} 2>&1)
          
          # エラーメッセージを除外
          if echo "$BACKEND_URL" | grep -q "ERROR"; then
            BACKEND_URL=""
          fi
          
          if [ -z "$BACKEND_URL" ] || [ "$BACKEND_URL" = "" ]; then
            echo "⚠️ バックエンドURLの取得に失敗しました。再試行中..."
            sleep 10
            BACKEND_URL=$(gcloud run services describe universegeo-backend \
              --region "$REGION_VALUE" \
              --format 'value(status.url)' \
              --project ${{ env.PROJECT_ID }} 2>&1)
            
            # エラーメッセージを除外
            if echo "$BACKEND_URL" | grep -q "ERROR"; then
              BACKEND_URL=""
            fi
          fi
          
          if [ -z "$BACKEND_URL" ] || [ "$BACKEND_URL" = "" ]; then
            echo "⚠️ 警告: バックエンドURLを取得できませんでした（フロントエンドジョブで再試行されます）"
            echo ""
            echo "📋 デバッグ情報:"
            echo "サービス一覧を確認中..."
            gcloud run services list --region "$REGION_VALUE" --project ${{ env.PROJECT_ID }} 2>&1
            echo ""
            echo "サービス詳細を確認中..."
            gcloud run services describe universegeo-backend \
              --region "$REGION_VALUE" \
              --project ${{ env.PROJECT_ID }} 2>&1 | head -50
            # エラーではなく警告として扱い、フロントエンドジョブで再試行を許可
            echo "backend_url=" >> $GITHUB_OUTPUT
          else
            echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
            echo "✅ Backend URL: $BACKEND_URL"
          fi

  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend
    if: github.event.inputs.deploy_frontend != 'false'
    runs-on: ubuntu-latest
    
    environment:
      name: Environment secrets
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Verify Secrets
        run: |
          echo "🔍 Secret確認中..."
          
          # GCP_SA_KEY の確認
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ エラー: GCP_SA_KEY が設定されていません"
            exit 1
          fi
          echo "✅ GCP_SA_KEY が設定されています"
          
          # フロントエンド用Secretsの確認
          echo ""
          echo "📋 フロントエンド用Secrets確認:"
          echo "VITE_GOOGLE_SPREADSHEET_ID: $([ -z "${{ secrets.VITE_GOOGLE_SPREADSHEET_ID }}" ] && echo "⚠️ 未設定（オプション）" || echo "✅ 設定済み")"
          echo "VITE_GOOGLE_SHEETS_API_KEY: $([ -z "${{ secrets.VITE_GOOGLE_SHEETS_API_KEY }}" ] && echo "⚠️ 未設定（オプション）" || echo "✅ 設定済み")"
          echo "VITE_GOOGLE_MAPS_API_KEY: $([ -z "${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}" ] && echo "⚠️ 未設定（オプション）" || echo "✅ 設定済み")"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          # リージョンの値を明示的に設定
          REGION_VALUE="${{ env.REGION }}"
          if [ -z "$REGION_VALUE" ] || [ "$REGION_VALUE" != "asia-northeast1" ]; then
            REGION_VALUE="asia-northeast1"
          fi
          
          gcloud auth configure-docker "${REGION_VALUE}-docker.pkg.dev"

      - name: Verify Dockerfile before build
        run: |
          echo "🔍 実際に使用されるDockerfileの内容を確認中..."
          echo ""
          echo "📋 現在のディレクトリ:"
          pwd
          echo ""
          echo "📋 Dockerfileの存在確認:"
          ls -la Dockerfile 2>/dev/null || echo "❌ ルートにDockerfileが見つかりません"
          echo ""
          echo "📋 すべてのDockerfileを検索:"
          find . -name "Dockerfile*" -type f 2>/dev/null | head -10
          echo ""
          echo "📋 ルートのDockerfileの内容（最初の60行）:"
          echo "----------------------------------------"
          head -60 Dockerfile 2>/dev/null || echo "❌ Dockerfileを読み込めません"
          echo "----------------------------------------"
          echo ""
          echo "📋 COPY行を検索:"
          grep -n "COPY.*from=builder" Dockerfile 2>/dev/null || echo "❌ COPY行が見つかりません"
          echo ""
          echo "📋 FROM行を検索:"
          grep -n "^FROM" Dockerfile 2>/dev/null || echo "❌ FROM行が見つかりません"

      - name: Build and push Docker image
        run: |
          # リージョンの値を明示的に設定
          REGION_VALUE="${{ env.REGION }}"
          if [ -z "$REGION_VALUE" ] || [ "$REGION_VALUE" != "asia-northeast1" ]; then
            REGION_VALUE="asia-northeast1"
          fi
          
          IMAGE_NAME="${REGION_VALUE}-docker.pkg.dev/${{ env.PROJECT_ID }}/universegeo/universegeo"
          BACKEND_URL="${{ needs.deploy-backend.outputs.backend_url }}"
          
          echo "🔍 デバッグ情報:"
          echo "  REGION_VALUE: $REGION_VALUE"
          echo "  BACKEND_URL from outputs: $BACKEND_URL"
          echo "  needs.deploy-backend.outputs.backend_url: ${{ needs.deploy-backend.outputs.backend_url }}"
          echo ""
          
          if [ -z "$BACKEND_URL" ] || [ "$BACKEND_URL" = "" ]; then
            echo "⚠️ バックエンドURLが空です。直接取得を試みます..."
            
            # 直接バックエンドURLを取得
            BACKEND_URL=$(gcloud run services describe universegeo-backend \
              --region "$REGION_VALUE" \
              --format 'value(status.url)' \
              --project ${{ env.PROJECT_ID }} 2>&1)
            
            echo "  直接取得したBACKEND_URL: $BACKEND_URL"
            
            if [ -z "$BACKEND_URL" ] || [ "$BACKEND_URL" = "" ]; then
              echo "❌ エラー: バックエンドURLが取得できませんでした"
              echo ""
              echo "📋 デバッグ情報:"
              echo "サービス一覧を確認中..."
              gcloud run services list --region "$REGION_VALUE" --project ${{ env.PROJECT_ID }} 2>&1
              exit 1
            fi
          fi
          
          echo "🏗️ Dockerイメージをビルド中..."
          echo "Backend URL: $BACKEND_URL"
          
          docker build \
            --build-arg VITE_API_BASE_URL="$BACKEND_URL" \
            --build-arg VITE_GOOGLE_SPREADSHEET_ID="${{ secrets.VITE_GOOGLE_SPREADSHEET_ID || '' }}" \
            --build-arg VITE_GOOGLE_SHEETS_API_KEY="${{ secrets.VITE_GOOGLE_SHEETS_API_KEY || '' }}" \
            --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY || '' }}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:latest" \
            .
          
          echo "📤 Dockerイメージをプッシュ中..."
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:latest"
          echo "✅ Dockerイメージのビルドとプッシュが完了しました"

      - name: Deploy to Cloud Run
        run: |
          # リージョンの値を明示的に設定
          REGION_VALUE="${{ env.REGION }}"
          if [ -z "$REGION_VALUE" ] || [ "$REGION_VALUE" != "asia-northeast1" ]; then
            REGION_VALUE="asia-northeast1"
          fi
          
          IMAGE_NAME="${REGION_VALUE}-docker.pkg.dev/${{ env.PROJECT_ID }}/universegeo/universegeo"
          
          gcloud run deploy universegeo \
            --image "${IMAGE_NAME}:${{ github.sha }}" \
            --region "$REGION_VALUE" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --project ${{ env.PROJECT_ID }}

      - name: Get Frontend URL
        id: frontend-url
        run: |
          # リージョンの値を明示的に設定
          REGION_VALUE="${{ env.REGION }}"
          if [ -z "$REGION_VALUE" ] || [ "$REGION_VALUE" != "asia-northeast1" ]; then
            REGION_VALUE="asia-northeast1"
          fi
          
          FRONTEND_URL=$(gcloud run services describe universegeo \
            --region "$REGION_VALUE" \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }})
          
          if [ -z "$FRONTEND_URL" ]; then
            echo "❌ エラー: フロントエンドURLを取得できませんでした"
            exit 1
          fi
          
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "✅ Frontend URL: $FRONTEND_URL"

      - name: Update Backend CORS
        run: |
          # リージョンの値を明示的に設定
          REGION_VALUE="${{ env.REGION }}"
          if [ -z "$REGION_VALUE" ] || [ "$REGION_VALUE" != "asia-northeast1" ]; then
            REGION_VALUE="asia-northeast1"
          fi
          
          FRONTEND_URL="${{ steps.frontend-url.outputs.frontend_url }}"
          
          # バージョン競合を回避するため、リトライロジックを追加
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            if [ $RETRY_COUNT -gt 0 ]; then
              echo "⏳ リトライ $RETRY_COUNT/$MAX_RETRIES: 5秒待機中..."
              sleep 5
            fi
            
            set +e
            gcloud run services update universegeo-backend \
              --update-env-vars FRONTEND_URL="$FRONTEND_URL" \
              --region "$REGION_VALUE" \
              --project ${{ env.PROJECT_ID }} \
              --quiet
            UPDATE_EXIT_CODE=$?
            set -e
            
            if [ $UPDATE_EXIT_CODE -eq 0 ]; then
              SUCCESS=true
              echo "✅ バックエンドのCORS設定が完了しました"
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 環境変数の更新に失敗しました。リトライします..."
              else
                echo "❌ 環境変数の更新に失敗しました（最大リトライ回数に達しました）"
                echo "💡 手動で設定してください: FRONTEND_URL=$FRONTEND_URL"
                exit 1
              fi
            fi
          done

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: ${{ needs.deploy-backend.outputs.backend_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: ${{ steps.frontend-url.outputs.frontend_url }}" >> $GITHUB_STEP_SUMMARY

