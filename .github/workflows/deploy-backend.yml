name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  REGION: asia-northeast1
  SERVICE_NAME: universegeo-backend

jobs:
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    
    # 他のワークフローと統一するため、Environment secrets を使用
    environment:
      name: Environment secrets
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          echo "🔍 必須Secretsの確認中..."
          echo "  Environment: Environment secrets"
          echo "  ⚠️ 注意: environmentが設定されている場合、Secretsは環境スコープから取得されます"
          echo ""
          
          # 環境スコープのSecretsを確認（environmentが設定されている場合、自動的に環境スコープから取得される）
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ GCP_SA_KEY is missing"
            echo "   環境スコープのSecretsに GCP_SA_KEY が設定されているか確認してください"
            echo "   Settings > Environments > Environment secrets > Secrets"
            echo ""
            echo "📝 設定手順:"
            echo "1. https://github.com/${{ github.repository }}/settings/environments/Environment%20secrets を開く"
            echo "2. Secrets セクションで「Add secret」をクリック"
            echo "3. Name: GCP_SA_KEY（大文字・小文字を正確に）"
            echo "4. Secret: サービスアカウントキー（JSON）の内容全体を貼り付け"
            echo "5. 「Add secret」をクリック"
            echo ""
            echo "詳細は GCP_SA_KEY_SETUP.md を参照してください"
            exit 1
          fi
          
          if [ -z "${{ secrets.BQ_DATASET }}" ]; then
            echo "❌ BQ_DATASET is missing"
            echo "   環境スコープのSecretsに BQ_DATASET が設定されているか確認してください"
            exit 1
          fi
          
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ] && [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "❌ GCP_PROJECT_ID is missing"
            echo "   環境スコープのSecretsまたはVarsに GCP_PROJECT_ID が設定されているか確認してください"
            exit 1
          fi
          
          echo "✅ 必須Secretsが設定されています"
          echo ""
          echo "📋 環境変数の確認:"
          echo "  GCP_SA_KEY: ✅ SET"
          echo "  GCP_PROJECT_ID: $([ -n "${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}" ] && echo '✅ SET' || echo '❌ NOT SET')"
          echo "  BQ_DATASET: ✅ SET"
          echo "  GOOGLE_SPREADSHEET_ID: $([ -n "${{ secrets.GOOGLE_SPREADSHEET_ID }}" ] && echo '✅ SET' || echo '⚠️ NOT SET')"
          echo "  FRONTEND_URL: $([ -n "${{ secrets.FRONTEND_URL }}" ] && echo '✅ SET' || echo '⚠️ NOT SET')"
          echo "  BACKEND_SERVICE_ACCOUNT: $([ -n "${{ secrets.BACKEND_SERVICE_ACCOUNT }}" ] && echo '✅ SET' || echo '⚠️ NOT SET (デフォルトSAが使用されます)')"
          echo "  SCHEDULER_SECRET: $([ -n "${{ secrets.SCHEDULER_SECRET }}" ] && echo '✅ SET' || echo '❌ NOT SET')"

          if [ -z "${{ secrets.SCHEDULER_SECRET }}" ]; then
            echo "❌ SCHEDULER_SECRET is missing"
            echo "   Settings > Environments > Environment secrets > Secrets に SCHEDULER_SECRET を追加してください"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify Backend Files
        working-directory: ./backend
        run: |
          echo "🔍 バックエンドファイルの確認:"
          echo ""
          echo "📁 ディレクトリ構造:"
          ls -la
          echo ""
          echo "📄 重要なファイルの確認:"
          echo "  Dockerfile: $([ -f Dockerfile ] && echo '✅ 存在' || echo '❌ 存在しない')"
          echo "  package.json: $([ -f package.json ] && echo '✅ 存在' || echo '❌ 存在しない')"
          echo "  tsconfig.json: $([ -f tsconfig.json ] && echo '✅ 存在' || echo '❌ 存在しない')"
          echo "  src/index.ts: $([ -f src/index.ts ] && echo '✅ 存在' || echo '❌ 存在しない')"

      - name: Static checks (type-check + no-streaming-insert)
        working-directory: ./backend
        run: |
          npm ci
          npm run type-check
          npm run check:no-streaming-insert

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          source: ./backend
          region: ${{ env.REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
          
          # 重要: 既存の env を壊さず追加更新
          env_vars_update_strategy: merge
          env_vars: |-
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }}
            BQ_DATASET=${{ secrets.BQ_DATASET }}
            GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}
            GOOGLE_SHEETS_API_KEY=${{ secrets.GOOGLE_SHEETS_API_KEY }}
            GOOGLE_SHEET_NAME=${{ secrets.GOOGLE_SHEET_NAME }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EMAIL_SERVICE=${{ secrets.EMAIL_SERVICE }}
            SENDGRID_API_KEY=${{ secrets.SENDGRID_API_KEY }}
            SENDGRID_FROM_EMAIL=${{ secrets.SENDGRID_FROM_EMAIL }}
            SIM_SOURCE_TABLE=${{ secrets.SIM_SOURCE_TABLE }}
            VERTEX_AI_LOCATION=${{ secrets.VERTEX_AI_LOCATION || 'us-central1' }}
            VERTEX_AI_MODEL=${{ secrets.VERTEX_AI_MODEL || 'gemini-2.0-flash-001' }}

          flags: >-
            --allow-unauthenticated
            --memory 512Mi
            --cpu 1
            --max-instances 10
            --timeout=600

          # 手動の update-traffic を消す
          revision_traffic: 'LATEST=100'

      - name: Set SCHEDULER_SECRET
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID || vars.GCP_PROJECT_ID }} \
            --update-env-vars=SCHEDULER_SECRET=${{ secrets.SCHEDULER_SECRET }}

      - name: Deployment Summary
        run: |
          echo "## ✅ Backend Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: Environment secrets" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: [${{ steps.deploy.outputs.url }}](${{ steps.deploy.outputs.url }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. バックエンドのログを確認して環境変数が正しく設定されているか確認" >> $GITHUB_STEP_SUMMARY
          echo "2. スプレッドシートにサービスアカウントを共有（編集者権限）" >> $GITHUB_STEP_SUMMARY
          echo "3. テストを実行" >> $GITHUB_STEP_SUMMARY
          echo ""
          echo "🚀 Backend deployed to: ${{ steps.deploy.outputs.url }}"
