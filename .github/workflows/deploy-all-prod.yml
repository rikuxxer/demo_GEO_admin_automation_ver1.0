name: Deploy All (Backend + Frontend) - Production

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'Dockerfile'
      - 'config/prod/**'
      - 'backend/**'
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy backend'
        required: false
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy frontend'
        required: false
        default: true
        type: boolean

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1

concurrency:
  group: deploy-universegeo-frontend
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend (Production)
    if: github.event.inputs.deploy_backend != 'false'
    runs-on: ubuntu-latest
    
    environment:
      name: Environment secrets
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Secrets
        run: |
          echo "🔍 Secrets確認中（本番環境）..."
          echo "Environment: Environment secrets"
          echo ""
          
          # GCP_SA_KEY の確認
          GCP_SA_KEY_VALUE="${{ secrets.GCP_SA_KEY }}"
          if [ -z "$GCP_SA_KEY_VALUE" ]; then
            echo "❌ エラー: GCP_SA_KEY が設定されていません（本番環境）"
            echo ""
            echo "📝 設定方法:"
            echo "1. https://github.com/${{ github.repository }}/settings/environments/Environment%20secrets を開く"
            echo "2. Secrets セクションで「Add secret」をクリック"
            echo "3. Name: GCP_SA_KEY（大文字・小文字を正確に）"
            echo "   ⚠️ 重要: Secret名は 'GCP_SA_KEY' と完全に一致する必要があります"
            echo "   ❌ 間違い: gcp_sa_key, GCP-SA-KEY, GCP_SA_KEY_ など"
            echo "4. Secret: サービスアカウントキー（JSON）の内容全体を貼り付け"
            echo "   - JSON全体（{ から } まで）をそのまま貼り付け"
            echo "   - 改行も含めてそのまま貼り付け"
            echo "5. 「Add secret」をクリック"
            echo ""
            echo "⚠️ 確認事項:"
            echo "- Environment secrets に 'GCP_SA_KEY' が存在するか確認"
            echo "- Secret名が正確に 'GCP_SA_KEY' であるか確認（大文字・小文字）"
            echo "- JSONファイルの内容全体をコピー&ペーストしているか確認"
            exit 1
          fi
          
          # 長さを確認（値は表示しない）
          GCP_SA_KEY_LENGTH=$(echo -n "$GCP_SA_KEY_VALUE" | wc -c)
          echo "✅ GCP_SA_KEY が設定されています（Environment secrets、長さ: $GCP_SA_KEY_LENGTH 文字）"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend
        working-directory: ./backend
        run: |
          REGION_VALUE="${{ env.REGION }}"
          
          # 環境変数を構築（デプロイ時に一緒に設定してバージョン競合を回避）
          ENV_VARS="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},BQ_DATASET=${{ secrets.BQ_DATASET }},NODE_ENV=production,DEBUG=false,LOG_LEVEL=info"
          
          if [ -n "${{ secrets.GOOGLE_SPREADSHEET_ID }}" ]; then
            ENV_VARS="$ENV_VARS,GOOGLE_SPREADSHEET_ID=${{ secrets.GOOGLE_SPREADSHEET_ID }}"
          fi
          
          if [ -n "${{ secrets.GOOGLE_SHEETS_API_KEY }}" ]; then
            ENV_VARS="$ENV_VARS,GOOGLE_SHEETS_API_KEY=${{ secrets.GOOGLE_SHEETS_API_KEY }}"
          fi
          
          if [ -n "${{ secrets.GOOGLE_SHEET_NAME }}" ]; then
            ENV_VARS="$ENV_VARS,GOOGLE_SHEET_NAME=${{ secrets.GOOGLE_SHEET_NAME }}"
          else
            ENV_VARS="$ENV_VARS,GOOGLE_SHEET_NAME=シート1"
          fi
          
          if [ -n "${{ secrets.FRONTEND_URL }}" ]; then
            ENV_VARS="$ENV_VARS,FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
          fi
          
          echo ""
          echo "🔧 環境変数をデプロイ時に設定します（バージョン競合を回避）..."
          
          gcloud run deploy universegeo-backend \
            --source . \
            --region "$REGION_VALUE" \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --max-instances 10 \
            --update-env-vars "$ENV_VARS" \
            --project ${{ env.PROJECT_ID }}
          
          echo "✅ デプロイと環境変数の設定が完了しました"

      - name: Get Backend URL
        id: backend-url
        run: |
          REGION_VALUE="${{ env.REGION }}"
          sleep 15
          
          BACKEND_URL=$(gcloud run services describe universegeo-backend \
            --region "$REGION_VALUE" \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }} 2>&1 || echo '')
          
          if [ -z "$BACKEND_URL" ] || echo "$BACKEND_URL" | grep -q "ERROR"; then
            echo "backend_url=" >> $GITHUB_OUTPUT
          else
            echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
            echo "✅ Backend URL: $BACKEND_URL"
          fi

  deploy-frontend:
    name: Deploy Frontend (Production)
    needs: deploy-backend
    if: github.event.inputs.deploy_frontend != 'false'
    runs-on: ubuntu-latest
    
    environment:
      name: Environment secrets
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application (Production)
        run: npm run build:prod

      - name: Verify Secrets
        run: |
          echo "🔍 Secrets確認中（本番環境 - フロントエンド）..."
          echo "Environment: Environment secrets"
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ エラー: GCP_SA_KEY が設定されていません（本番環境）"
            echo "   Settings > Environments > Environment secrets > Secrets に GCP_SA_KEY を設定してください"
            exit 1
          fi
          echo "✅ GCP_SA_KEY が設定されています（Environment secrets）"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          REGION_VALUE="${{ env.REGION }}"
          gcloud auth configure-docker "${REGION_VALUE}-docker.pkg.dev"

      - name: Build and push Docker image
        run: |
          REGION_VALUE="${{ env.REGION }}"
          IMAGE_NAME="${REGION_VALUE}-docker.pkg.dev/${{ env.PROJECT_ID }}/universegeo/universegeo"
          BACKEND_URL="${{ needs.deploy-backend.outputs.backend_url }}"
          
          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL=$(gcloud run services describe universegeo-backend \
              --region "$REGION_VALUE" \
              --format 'value(status.url)' \
              --project ${{ env.PROJECT_ID }} 2>&1 || echo '')
          fi
          
          docker build \
            --build-arg VITE_API_BASE_URL="$BACKEND_URL" \
            --build-arg VITE_GOOGLE_SPREADSHEET_ID="${{ secrets.VITE_GOOGLE_SPREADSHEET_ID }}" \
            --build-arg VITE_GOOGLE_SHEETS_API_KEY="${{ secrets.VITE_GOOGLE_SHEETS_API_KEY }}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:latest" \
            .
          
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:latest"

      - name: Deploy to Cloud Run
        run: |
          REGION_VALUE="${{ env.REGION }}"
          IMAGE_NAME="${REGION_VALUE}-docker.pkg.dev/${{ env.PROJECT_ID }}/universegeo/universegeo"
          
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          while [ $RETRY -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            if [ $RETRY -gt 0 ]; then
              echo "⏳ リトライ $RETRY/$MAX_RETRIES: 15秒待機..."
              sleep 15
            fi
            set +e
            gcloud run deploy universegeo \
              --image "${IMAGE_NAME}:${{ github.sha }}" \
              --region "$REGION_VALUE" \
              --platform managed \
              --allow-unauthenticated \
              --port 8080 \
              --memory 512Mi \
              --cpu 1 \
              --max-instances 10 \
              --project ${{ env.PROJECT_ID }}
            EXIT=$?
            set -e
            if [ $EXIT -eq 0 ]; then
              SUCCESS=true
              echo "✅ Deploy succeeded"
            else
              RETRY=$((RETRY + 1))
              if [ $RETRY -ge $MAX_RETRIES ]; then
                echo "❌ Deploy failed after $MAX_RETRIES retries"
                exit 1
              fi
              echo "⚠️ Deploy failed (exit $EXIT). Retrying..."
            fi
          done

      - name: Get Frontend URL
        id: frontend-url
        run: |
          REGION_VALUE="${{ env.REGION }}"
          FRONTEND_URL=$(gcloud run services describe universegeo \
            --region "$REGION_VALUE" \
            --format 'value(status.url)' \
            --project ${{ env.PROJECT_ID }})
          
          echo "frontend_url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "✅ Frontend URL: $FRONTEND_URL"

      - name: Update Backend CORS
        run: |
          REGION_VALUE="${{ env.REGION }}"
          FRONTEND_URL="${{ steps.frontend-url.outputs.frontend_url }}"
          
          # バージョン競合を回避するため、リトライロジックを追加
          MAX_RETRIES=3
          RETRY_COUNT=0
          SUCCESS=false
          
          while [ $RETRY_COUNT -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            if [ $RETRY_COUNT -gt 0 ]; then
              echo "⏳ リトライ $RETRY_COUNT/$MAX_RETRIES: 5秒待機中..."
              sleep 5
            fi
            
            set +e
            gcloud run services update universegeo-backend \
              --update-env-vars FRONTEND_URL="$FRONTEND_URL" \
              --region "$REGION_VALUE" \
              --project ${{ env.PROJECT_ID }} \
              --quiet
            UPDATE_EXIT_CODE=$?
            set -e
            
            if [ $UPDATE_EXIT_CODE -eq 0 ]; then
              SUCCESS=true
              echo "✅ バックエンドのCORS設定が完了しました"
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "⚠️ 環境変数の更新に失敗しました。リトライします..."
              else
                echo "❌ 環境変数の更新に失敗しました（最大リトライ回数に達しました）"
                echo "💡 手動で設定してください: FRONTEND_URL=$FRONTEND_URL"
                exit 1
              fi
            fi
          done

      - name: Deployment Summary
        run: |
          echo "## ✅ Deployment Complete (Production)" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: ${{ needs.deploy-backend.outputs.backend_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: ${{ steps.frontend-url.outputs.frontend_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Important" >> $GITHUB_STEP_SUMMARY
          echo "- 本番環境へのデプロイが完了しました" >> $GITHUB_STEP_SUMMARY
          echo "- モニタリングを確認してください" >> $GITHUB_STEP_SUMMARY
