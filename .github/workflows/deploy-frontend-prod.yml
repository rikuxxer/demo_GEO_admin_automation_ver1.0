name: Deploy Frontend to Cloud Run (Production)

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Backend API URL (leave empty to use secret)'
        required: false
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast1
  SERVICE_NAME: universegeo
  REPOSITORY: universegeo

# 同一サービスの同時デプロイを防ぎ、ReplaceService のバージョン競合 (code 10) を回避
concurrency:
  group: deploy-universegeo-frontend
  cancel-in-progress: false

jobs:
  deploy-frontend:
    name: Deploy Frontend to Cloud Run (Production)
    runs-on: ubuntu-latest
    
    environment:
      name: Environment secrets
    
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application (Production)
        run: |
          echo "🏗️ Building application for production..."
          npm run build:prod
          echo "✅ Build completed"

      - name: Verify Secrets
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ エラー: GCP_SA_KEY が設定されていません"
            echo "   Settings > Environments > Environment secrets > Secrets に GCP_SA_KEY を設定してください"
            exit 1
          fi
          echo "✅ GCP_SA_KEY が設定されています（Environment secrets）"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          REGION_VALUE="${{ env.REGION }}"
          gcloud auth configure-docker "${REGION_VALUE}-docker.pkg.dev"

      - name: Create Artifact Registry repository (if not exists)
        run: |
          REGION_VALUE="${{ env.REGION }}"
          gcloud artifacts repositories create ${{ env.REPOSITORY }} \
            --repository-format=docker \
            --location="$REGION_VALUE" \
            --description="UNIVERSEGEO Docker repository (Production)" || echo "Repository already exists"

      - name: Set backend URL
        id: set-backend-url
        run: |
          REGION_VALUE="${{ env.REGION }}"
          
          if [ -n "${{ github.event.inputs.backend_url }}" ]; then
            BACKEND_URL="${{ github.event.inputs.backend_url }}"
          elif [ -n "${{ secrets.BACKEND_URL }}" ]; then
            BACKEND_URL="${{ secrets.BACKEND_URL }}"
          else
            BACKEND_URL=$(gcloud run services describe universegeo-backend \
              --region "$REGION_VALUE" \
              --format 'value(status.url)' \
              --project ${{ env.PROJECT_ID }} 2>&1 || echo '')
            
            if [ -z "$BACKEND_URL" ] || echo "$BACKEND_URL" | grep -q "ERROR"; then
              echo "❌ エラー: バックエンドURLを取得できませんでした"
              echo "   Settings > Environments > Environment secrets > Secrets に BACKEND_URL を設定してください"
              exit 1
            fi
          fi
          
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV
          echo "✅ Backend URL: $BACKEND_URL"

      - name: Build and push Docker image
        run: |
          REGION_VALUE="${{ env.REGION }}"
          IMAGE_NAME="${REGION_VALUE}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          
          echo "🐳 Building Docker image for production..."
          echo "Backend URL: $BACKEND_URL"
          
          docker build \
            --build-arg VITE_API_BASE_URL="$BACKEND_URL" \
            --build-arg VITE_GOOGLE_SPREADSHEET_ID="${{ secrets.VITE_GOOGLE_SPREADSHEET_ID }}" \
            --build-arg VITE_GOOGLE_SHEETS_API_KEY="${{ secrets.VITE_GOOGLE_SHEETS_API_KEY }}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:latest" \
            .
          
          echo "📤 Pushing Docker image..."
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:latest"
          echo "✅ Image pushed successfully"

      - name: Deploy to Cloud Run
        run: |
          REGION_VALUE="${{ env.REGION }}"
          IMAGE_NAME="${REGION_VALUE}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE_NAME }}"
          
          echo "🚀 Deploying to Cloud Run (Production)..."
          
          MAX_RETRIES=3
          RETRY=0
          SUCCESS=false
          while [ $RETRY -lt $MAX_RETRIES ] && [ "$SUCCESS" = false ]; do
            if [ $RETRY -gt 0 ]; then
              echo "⏳ バージョン競合の可能性のためリトライ $RETRY/$MAX_RETRIES: 15秒待機..."
              sleep 15
            fi
            set +e
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image "${IMAGE_NAME}:${{ github.sha }}" \
              --region "$REGION_VALUE" \
              --platform managed \
              --allow-unauthenticated \
              --port 8080 \
              --memory 512Mi \
              --cpu 1 \
              --min-instances 0 \
              --max-instances 10 \
              --timeout 300 \
              --project ${{ env.PROJECT_ID }}
            EXIT=$?
            set -e
            if [ $EXIT -eq 0 ]; then
              SUCCESS=true
              echo "✅ Deploy succeeded"
            else
              RETRY=$((RETRY + 1))
              if [ $RETRY -ge $MAX_RETRIES ]; then
                echo "❌ Deploy failed after $MAX_RETRIES retries"
                exit 1
              fi
              echo "⚠️ Deploy failed (exit $EXIT). Retrying..."
            fi
          done

      - name: Get service URL
        id: get-url
        run: |
          REGION_VALUE="${{ env.REGION }}"
          FRONTEND_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region "$REGION_VALUE" \
            --format 'value(status.url)')
          
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "FRONTEND_URL=$FRONTEND_URL" >> $GITHUB_ENV
          echo "🚀 Frontend deployed to: $FRONTEND_URL"

      - name: Update Backend CORS and Environment Variables
        run: |
          REGION_VALUE="${{ env.REGION }}"
          FRONTEND_URL="${{ steps.get-url.outputs.url }}"
          
          echo "🔄 バックエンドのCORS設定と環境変数を更新中（本番環境）..."
          
          gcloud run services update universegeo-backend \
            --update-env-vars FRONTEND_URL="$FRONTEND_URL" \
            --region "$REGION_VALUE" \
            --project ${{ env.PROJECT_ID }} \
            --quiet || echo "⚠️ バックエンド更新をスキップしました"

      - name: Deployment Summary
        run: |
          echo "## ✅ Frontend Deployment Successful (Production)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Service**: ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: production" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: [$FRONTEND_URL]($FRONTEND_URL)" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend URL**: $BACKEND_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Important" >> $GITHUB_STEP_SUMMARY
          echo "- 本番環境へのデプロイが完了しました" >> $GITHUB_STEP_SUMMARY
          echo "- モニタリングを確認してください" >> $GITHUB_STEP_SUMMARY
